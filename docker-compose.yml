services:
  transmission-watchdog:
    build: .
    image: transmission-watchdog
    container_name: transmission-watchdog
    restart: unless-stopped
    env_file:
      - .env
    # When using rTorrent, set RTORRENT_SOCKET_PATH in .env to the host directory
    # containing rpc.socket. Falls back to /tmp/rtorrent-disabled (harmless empty dir).
    volumes:
      - ${RTORRENT_SOCKET_PATH:-/tmp/rtorrent-disabled}:/run/rtorrent:ro

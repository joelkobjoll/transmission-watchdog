services:
  transmission-watchdog:
    build: .
    image: transmission-watchdog
    container_name: transmission-watchdog
    restart: unless-stopped
    env_file:
      - .env
    # Uncomment to share the rTorrent SCGI socket via a named volume.
    # The rTorrent container must mount the same volume at the path where it
    # writes network.scgi.open_local (e.g. /run/rtorrent/rpc.socket).
    volumes:
      - rtorrent_run:/run/rtorrent:ro

volumes:
  rtorrent_run:
    external: true # created and owned by the rTorrent container's compose stack
